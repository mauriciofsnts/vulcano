name: Deploy
run-name: Deploy 🚀
on:
  push:
    branches:
      - master

permissions:
  contents: write
  packages: write

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Docker Context for Buildx
        id: buildx-context
        run: |
          docker context create builders

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v2
        with:
          version: latest
          endpoint: builders

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v1
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set short git commit SHA
        id: vars
        run: |
          echo "COMMIT_SHORT_SHA=$(git rev-parse --short ${{ github.sha }})" >> $GITHUB_ENV

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          file: Dockerfile
          context: .
          push: true
          tags: ghcr.io/mauriciofsnts/vulcano:${{ env.COMMIT_SHORT_SHA }},ghcr.io/mauriciofsnts/vulcano:master

      - name: Update image tag and trigger ArgoCD sync
        run: |
          sed -i "s/newTag: .*/newTag: ${{ env.COMMIT_SHORT_SHA }}/" .infra/manifests/vulcano/kustomization.yaml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .infra/manifests/vulcano/kustomization.yaml
          git commit -m "ci: bump image tag to ${{ env.COMMIT_SHORT_SHA }} [skip ci]"
          git push
