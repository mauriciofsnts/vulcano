apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vulcano-valkey
  namespace: argocd
spec:
  project: default
  source:
    repoURL: registry-1.docker.io/bitnamicharts
    chart: valkey
    targetRevision: "2.3.0"
    helm:
      releaseName: valkey
      values: |
        architecture: standalone
        primary:
          livenessProbe:
            initialDelaySeconds: 5
          readinessProbe:
            initialDelaySeconds: 5
        auth:
          enabled: false
        commonConfiguration: |-
          appendonly yes
          save ""
  destination:
    server: https://kubernetes.default.svc
    namespace: vulcano
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
